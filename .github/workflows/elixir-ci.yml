# SPDX-License-Identifier: MPL-2.0
name: Elixir CI
on:
  push:
    branches: [main]
    paths:
      - 'elixir-mcp/**'
      - '.github/workflows/elixir-ci.yml'
  # No pull_request paths-filter: Dialyzer is a REQUIRED status check, so it must
  # report on every PR (a path-filtered required check deadlocks PRs that don't
  # touch its paths). The "Detect relevant changes" step gates the heavy work; the
  # non-required test matrix is gated the same way so it doesn't run on every PR.
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read   # change-detector reads the PR's file list
    defaults:
      run:
        working-directory: elixir-mcp
    strategy:
      matrix:
        elixir: ['1.15', '1.16', '1.17']
        otp: ['26']
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Detect relevant changes
        id: detect
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          PATTERN='^elixir-mcp/'
          # Fail-safe detector (estate required-gate convention): default to
          # running the suite; skip ONLY when a successful diff against the
          # base tip shows nothing relevant. Uses git (two-dot tree diff, so
          # shallow checkouts work) instead of `gh api`, whose non-JSON error
          # responses hard-failed this step (#51).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" \
               && FILES=$(git diff --name-only FETCH_HEAD HEAD); then
              if printf '%s\n' "$FILES" | grep -qE "$PATTERN"; then
                echo "relevant=true" >> "$GITHUB_OUTPUT"
              else
                echo "relevant=false" >> "$GITHUB_OUTPUT"; echo "No elixir-mcp changes — pass-through (required-check shim)."
              fi
            else
              echo "relevant=true" >> "$GITHUB_OUTPUT"; echo "Detector could not compute the diff — failing safe (run=true)."
            fi
          else
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Elixir
        if: steps.detect.outputs.relevant == 'true'
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
      - name: Cache deps
        if: steps.detect.outputs.relevant == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            elixir-mcp/deps
            elixir-mcp/_build
          key: mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('elixir-mcp/mix.lock') }}
          restore-keys: |
            mix-${{ matrix.elixir }}-${{ matrix.otp }}-
      - name: Install dependencies
        if: steps.detect.outputs.relevant == 'true'
        run: mix deps.get
      - name: Compile (warnings as errors)
        if: steps.detect.outputs.relevant == 'true'
        run: mix compile --warnings-as-errors
      - name: Check formatting
        if: steps.detect.outputs.relevant == 'true'
        run: mix format --check-formatted
      - name: Run tests
        if: steps.detect.outputs.relevant == 'true'
        run: mix test --trace
  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read   # change-detector reads the PR's file list
    defaults:
      run:
        working-directory: elixir-mcp
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Detect relevant changes
        id: detect
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          PATTERN='^elixir-mcp/'
          # Fail-safe detector (estate required-gate convention): default to
          # running the suite; skip ONLY when a successful diff against the
          # base tip shows nothing relevant. Uses git (two-dot tree diff, so
          # shallow checkouts work) instead of `gh api`, whose non-JSON error
          # responses hard-failed this step (#51).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if git fetch --no-tags --depth=1 origin "${{ github.base_ref }}" \
               && FILES=$(git diff --name-only FETCH_HEAD HEAD); then
              if printf '%s\n' "$FILES" | grep -qE "$PATTERN"; then
                echo "relevant=true" >> "$GITHUB_OUTPUT"
              else
                echo "relevant=false" >> "$GITHUB_OUTPUT"; echo "No elixir-mcp changes — pass-through (required-check shim)."
              fi
            else
              echo "relevant=true" >> "$GITHUB_OUTPUT"; echo "Detector could not compute the diff — failing safe (run=true)."
            fi
          else
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Elixir
        if: steps.detect.outputs.relevant == 'true'
        uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
        with:
          elixir-version: '1.17'
          otp-version: '26'
      - name: Cache deps
        if: steps.detect.outputs.relevant == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            elixir-mcp/deps
            elixir-mcp/_build
          key: dialyzer-${{ hashFiles('elixir-mcp/mix.lock') }}
          restore-keys: |
            dialyzer-
      - name: Install dependencies
        if: steps.detect.outputs.relevant == 'true'
        run: mix deps.get
      - name: Run Dialyzer
        if: steps.detect.outputs.relevant == 'true'
        run: mix dialyzer
        continue-on-error: true
